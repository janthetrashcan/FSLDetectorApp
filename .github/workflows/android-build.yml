name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 # Step 1: Check out repository code

      - name: Set up JDK 17 # Step 2: Ensure the correct Java Development Kit is available
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew # Step 3: Make the Gradle wrapper script executable
        run: chmod +x gradlew

      - name: Build Debug APK # Step 4: Run the Gradle task to assemble a debug APK
        run: ./gradlew assembleDebug

      - name: Upload Artifact # Step 5: Save the generated APK as a workflow artifact for download
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
