name: Android CI Build

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      # Optional inputs for manual runs
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      run_lint:
        description: 'Run Android lint?'
        required: false
        default: 'true'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Lint (if selected manually)
        if: github.event_name == 'push' || github.event.inputs.run_lint == 'true'
        run: ./gradlew lint

      - name: Build Android project
        run: ./gradlew build
