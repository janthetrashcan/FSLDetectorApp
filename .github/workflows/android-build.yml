name: Android CI Build & Release

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      run_lint:
        description: 'Run Android lint?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Lint
        if: github.event_name == 'push' || github.event.inputs.run_lint == 'true'
        run: ./gradlew lint

      - name: Build Release APK and Bundle
        run: ./gradlew assembleRelease bundleRelease

      - name: Rename Artifacts
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/MyAwesomeApp-${{ github.ref_name }}.apk
          mv app/build/outputs/bundle/release/app-release-unsigned.aab app/build/outputs/bundle/release/MyAwesomeApp-${{ github.ref_name }}.aab

      - name: Upload Artifacts to Actions Tab
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}